<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Predictor | Diabetes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        /* Monochromatic theme */
                        pagebg: '#F9FAFB',
                        cardbg: '#FFFFFF',
                        darkbg: '#111827',
                        darkcard: '#1F2937',
                        primary: '#000000',
                        primaryhover: '#374151',
                        darkprimary: '#FFFFFF',
                        darkprimaryhover: '#D1D5DB'
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-pagebg text-gray-900 dark:bg-darkbg dark:text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-cardbg dark:bg-darkcard w-full max-w-lg rounded-2xl shadow-lg p-6 sm:p-8 fade-in relative border border-gray-200 dark:border-gray-700">
        
        <button id="themeToggle" class="absolute top-6 right-6 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 transition">
            🌓
        </button>

        <h2 class="text-2xl font-semibold mb-2 text-center">Type 2 Diabetes Predictor</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 text-center mb-6">Enter your vitals to predict your risk profile.</p>

        <form id="predictionForm" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Gender</label>
                    <select id="gender" required class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Age</label>
                    <input type="number" id="age" required min="0" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Hypertension</label>
                    <select id="hypertension" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Heart Disease</label>
                    <select id="heart_disease" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Smoking History</label>
                <select id="smoking_history" class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                    <option value="never">Never</option>
                    <option value="past">Past</option>
                    <option value="active">Active</option>
                </select>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">BMI</label>
                    <input type="number" id="bmi" step="0.1" required class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                    <p class="text-xs text-gray-500 mt-1 dark:text-gray-400">Normal: 18.5 - 24.9</p>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Glucose</label>
                    <input type="number" id="glucose" required class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                    <p class="text-xs text-gray-500 mt-1 dark:text-gray-400">Normal: &lt; 100 mg/dL</p>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">HbA1c</label>
                    <input type="number" id="hba1c" step="0.1" required class="w-full p-2 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-darkprimary">
                    <p class="text-xs text-gray-500 mt-1 dark:text-gray-400">Normal: &lt; 5.7%</p>
                </div>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-primaryhover dark:bg-darkprimary dark:hover:bg-darkprimaryhover text-white dark:text-black font-medium py-3 rounded-xl transition duration-300 mt-4 shadow-sm">
                Analyze Health Profile
            </button>
        </form>

        <div id="resultsSection" class="hidden text-center fade-in py-6">
            <h3 class="text-xl font-semibold mb-4">Risk Analysis Complete</h3>
            <div class="inline-flex items-center justify-center w-32 h-32 rounded-full border-8 border-gray-800 dark:border-gray-200 mb-4">
                <span id="riskPercentage" class="text-3xl font-bold">--%</span>
            </div>
            <p id="riskLabel" class="text-lg font-medium mb-4">Awaiting Data</p>
            
            <div class="bg-gray-100 dark:bg-gray-800 rounded-lg p-4 text-left mb-6 border border-gray-200 dark:border-gray-700">
                <h4 class="font-semibold mb-2">Suggestions:</h4>
                <ul id="suggestionsList" class="list-disc pl-5 text-sm space-y-1">
                    </ul>
            </div>

            <button id="resetBtn" class="w-full border-2 border-primary dark:border-darkprimary text-primary dark:text-darkprimary hover:bg-primary dark:hover:bg-darkprimary hover:text-white dark:hover:text-black font-medium py-2 rounded-xl transition duration-300">
                Assess Another Profile
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
