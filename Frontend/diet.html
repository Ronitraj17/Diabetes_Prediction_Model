<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Diet Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medicalBlue: 'rgba(205, 220, 227, 0.95)', 
                        slateAccent: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.390, 0.575, 0.565, 1.000) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card {
            background: rgba(205, 220, 227, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 text-slate-800 bg-cover bg-center bg-no-repeat bg-fixed"
      style="background-image: url('diapic1.png');">

    <div class="absolute inset-0 bg-white/10"></div>

    <div class="relative z-10 glass-card w-full max-w-lg rounded-[3rem] shadow-2xl p-8 sm:p-12 fade-in">
        
        <div class="flex flex-col items-center mb-10 text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-1 uppercase tracking-tight">Dietary Guidance</h2>
            <p class="text-slate-600 font-bold opacity-70 text-xs uppercase tracking-widest">Personalized Clinical Nutrition</p>
        </div>

        <div id="riskDisplay" class="mb-8 p-4 rounded-2xl bg-white/40 border border-white text-center text-sm font-black uppercase tracking-widest shadow-sm">
            </div>

        <div id="dietContent" class="space-y-6">
            </div>

        <button onclick="window.location.href='index.html'"
                class="mt-10 w-full py-4 px-6 rounded-2xl border-2 border-slate-800 text-slate-800 font-black uppercase tracking-widest transition-all duration-300 hover:bg-slate-800 hover:text-white active:scale-95 shadow-lg">
            Return to Assessment
        </button>

    </div>

    <script src="diet.js"></script>
</body>
</html>
